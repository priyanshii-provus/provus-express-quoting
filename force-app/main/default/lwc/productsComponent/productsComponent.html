<template>
  <div class="products-container">
    <div class="premium-header">
      <div class="premium-header-content">
        <div class="greeting-box">
          <lightning-icon
            icon-name="standard:product"
            size="medium"
            class="premium-header-icon"
          ></lightning-icon>
          <div class="greeting-text">
            <h1>Products</h1>
            <p>Manage your product catalog, service items, and hardware offerings</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content Card -->
    <div class="premium-card">
      <div class="card-title-row">
        <div class="card-heading">
          <h2>Product Catalog</h2>
          <span class="badge">{products.length} Products</span>
        </div>
        <div class="card-actions">
          <button class="import-btn" onclick={handleOpenImportModal}>
            <lightning-icon icon-name="utility:upload" size="xx-small"></lightning-icon>
            <span>Import CSV</span>
          </button>
          <button class="new-product-btn" onclick={handleNewProduct}>
            <lightning-icon icon-name="utility:add" size="xx-small" variant="inverse"></lightning-icon>
            <span>New Product</span>
          </button>
        </div>
      </div>

      <!-- Datatable -->
      <div class="table-container">
        <lightning-datatable
          key-field="Id"
          data={products}
          columns={columns}
          draft-values={draftValues}
          onsave={handleSave}
          onrowaction={handleRowAction}
          hide-checkbox-column
          class="slds-m-top_medium"
        ></lightning-datatable>
      </div>
    </div>
  </div>

  <!-- New Product Modal -->
  <template if:true={isModalOpen}>
    <section role="dialog" tabindex="-1" aria-labelledby="prod-modal-heading" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_small">
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={closeModal}>
            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
          </button>
          <h2 id="prod-modal-heading" class="slds-modal__title slds-hyphenate">New Product</h2>
        </header>
        <div class="slds-modal__content slds-p-around_medium" id="prod-modal-content">
          <lightning-input label="Product Name" required data-field="name" value={newProduct.name} onchange={handleModalFieldChange}></lightning-input>
          <lightning-input label="Product Code" data-field="productCode" value={newProduct.productCode} onchange={handleModalFieldChange} class="slds-m-top_small"></lightning-input>
          <div class="slds-grid slds-gutters slds-m-top_small">
            <div class="slds-col slds-size_1-of-2">
              <lightning-input label="Price" type="number" formatter="currency" currency-code="INR" step="0.01" data-field="price" value={newProduct.price} onchange={handleModalFieldChange}></lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-2">
              <lightning-input label="Cost" type="number" formatter="currency" currency-code="INR" step="0.01" data-field="cost" value={newProduct.cost} onchange={handleModalFieldChange}></lightning-input>
            </div>
          </div>
          <lightning-textarea label="Description" data-field="description" value={newProduct.description} onchange={handleModalFieldChange} class="slds-m-top_small"></lightning-textarea>
          <lightning-combobox label="Family" value={newProduct.family} options={familyOptions} onchange={handleModalFamilyChange} class="slds-m-top_small"></lightning-combobox>
        </div>
        <footer class="slds-modal__footer">
          <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
          <lightning-button data-id="saveButton" variant="brand" label="Save" onclick={handleSaveNewProduct} class="slds-m-left_x-small"></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
  </template>

  <!-- Import CSV Modal -->
  <template if:true={isImportModalOpen}>
    <section role="dialog" tabindex="-1" aria-labelledby="import-prod-heading" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
      <div class="slds-modal__container import-modal-container">
        <header class="slds-modal__header import-modal-header">
          <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={closeImportModal}>
            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
          </button>
          <h2 id="import-prod-heading" class="slds-modal__title slds-hyphenate">Import Products</h2>
          <p class="import-modal-subtitle">Upload a CSV file with the columns shown below. Required fields are marked with *.</p>
        </header>
        <div class="slds-modal__content slds-p-around_medium">
          <h3 class="import-section-title">Expected Format</h3>
          <div class="import-format-table-wrap">
            <table class="import-format-table">
              <thead>
                <tr>
                  <th>Name*</th>
                  <th>ProductCode</th>
                  <th>Description</th>
                  <th>Family</th>
                  <th>Price*</th>
                  <th>Cost</th>
                  <th>Is_Active</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Cloud Hosting</td>
                  <td>CHP-001</td>
                  <td>Enterprise hosting</td>
                  <td>Software</td>
                  <td>500</td>
                  <td>350</td>
                  <td>true</td>
                </tr>
              </tbody>
            </table>
          </div>
          <p class="import-format-hint">Valid families: Software, Hardware, Service | Is_Active should be true or false</p>

          <h3 class="import-section-title slds-m-top_medium">File Upload</h3>
          <div class={dropzoneClass} ondragover={handleDragOver} ondragleave={handleDragLeave} ondrop={handleDrop} onclick={handleDropzoneClick}>
            <template if:false={importFileName}>
              <lightning-icon icon-name="utility:upload" size="small" class="dropzone-icon"></lightning-icon>
              <p class="dropzone-title">Upload CSV file</p>
              <p class="dropzone-hint">Drag & drop or click to browse (max. 5MB)</p>
            </template>
            <template if:true={importFileName}>
              <lightning-icon icon-name="doctype:csv" size="small" class="dropzone-icon-file"></lightning-icon>
              <p class="dropzone-title">{importFileName}</p>
              <p class="dropzone-hint">{importRowCount} rows detected</p>
            </template>
            <input type="file" accept=".csv" class="file-input-hidden" onchange={handleFileChange} />
          </div>

          <template if:true={importError}>
            <div class="import-error-box">
              <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
              <span>{importError}</span>
            </div>
          </template>
        </div>
        <footer class="slds-modal__footer import-modal-footer">
          <div class="import-footer-left">
            <button class="btn-download-template" onclick={handleDownloadTemplate}>
              <lightning-icon icon-name="utility:download" size="xx-small"></lightning-icon>
              <span>Download Template</span>
            </button>
          </div>
          <div class="import-footer-right">
            <lightning-button label="Cancel" onclick={closeImportModal}></lightning-button>
            <lightning-button variant="brand" label={importButtonLabel} onclick={handleImportCsv} disabled={isImportDisabled} class="slds-m-left_x-small"></lightning-button>
          </div>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
  </template>
</template>
