<template>
  <div class="roles-container">
    <div class="premium-header">
      <div class="premium-header-content">
        <div class="greeting-box">
          <lightning-icon
            icon-name="standard:user_role"
            size="medium"
            class="premium-header-icon"
          ></lightning-icon>
          <div class="greeting-text">
            <h1>Resource Roles</h1>
            <p>Configure resource roles, rates, and billing units for your projects</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content Card -->
    <div class="premium-card">
      <div class="card-title-row">
        <div class="card-heading">
          <h2>Role Catalog</h2>
          <span class="badge">{resources.length} Roles</span>
        </div>
        <div class="card-actions">
          <button class="import-btn" onclick={handleOpenImportModal}>
            <lightning-icon
              icon-name="utility:upload"
              size="xx-small"
            ></lightning-icon>
            <span>Import CSV</span>
          </button>
          <button class="new-role-btn" onclick={handleNewResource}>
            <lightning-icon
              icon-name="utility:add"
              size="xx-small"
              variant="inverse"
            ></lightning-icon>
            <span>New Resource Role</span>
          </button>
        </div>
      </div>

      <!-- Datatable -->
      <div class="table-container">
        <lightning-datatable
          key-field="Id"
          data={resources}
          columns={columns}
          draft-values={draftValues}
          onsave={handleSave}
          onrowaction={handleRowAction}
          hide-checkbox-column
          class="slds-m-top_medium"
        ></lightning-datatable>
      </div>
    </div>
  </div>

  <!-- New Resource Role Modal -->
  <template if:true={isModalOpen}>
    <section
      role="dialog"
      tabindex="-1"
      aria-labelledby="role-modal-heading"
      aria-modal="true"
      class="slds-modal slds-fade-in-open slds-modal_small"
    >
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <button
            class="slds-button slds-button_icon slds-modal__close"
            title="Close"
            onclick={closeModal}
          >
            <lightning-icon
              icon-name="utility:close"
              alternative-text="close"
              size="small"
            ></lightning-icon>
          </button>
          <h2 id="role-modal-heading" class="slds-modal__title slds-hyphenate">
            New Resource Role
          </h2>
        </header>
        <div
          class="slds-modal__content slds-p-around_medium"
          id="role-modal-content"
        >
          <lightning-input
            label="Role Name"
            required
            data-field="name"
            value={newRole.name}
            onchange={handleModalFieldChange}
          ></lightning-input>
          <lightning-combobox
            label="Billing Unit"
            value={newRole.billingUnit}
            options={billingUnitOptions}
            onchange={handleModalBillingChange}
            class="slds-m-top_small"
          ></lightning-combobox>
          <lightning-input
            label="Price"
            type="number"
            formatter="currency"
            currency-code="INR"
            step="0.01"
            data-field="price"
            value={newRole.price}
            onchange={handleModalFieldChange}
            class="slds-m-top_small"
          ></lightning-input>
          <lightning-input
            label="Cost"
            type="number"
            formatter="currency"
            currency-code="INR"
            step="0.01"
            data-field="cost"
            value={newRole.cost}
            onchange={handleModalFieldChange}
            class="slds-m-top_small"
          ></lightning-input>
          <lightning-input
            label="Location"
            data-field="location"
            value={newRole.location}
            onchange={handleModalFieldChange}
            class="slds-m-top_small"
          ></lightning-input>
        </div>
        <footer class="slds-modal__footer">
          <lightning-button
            label="Cancel"
            onclick={closeModal}
          ></lightning-button>
          <lightning-button
            data-id="saveButton"
            variant="brand"
            label="Save"
            onclick={handleSaveNewRole}
            class="slds-m-left_x-small"
          ></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
  </template>

  <!-- Import CSV Modal -->
  <template if:true={isImportModalOpen}>
    <section
      role="dialog"
      tabindex="-1"
      aria-labelledby="import-modal-heading"
      aria-modal="true"
      class="slds-modal slds-fade-in-open slds-modal_medium"
    >
      <div class="slds-modal__container import-modal-container">
        <header class="slds-modal__header import-modal-header">
          <button
            class="slds-button slds-button_icon slds-modal__close"
            title="Close"
            onclick={closeImportModal}
          >
            <lightning-icon
              icon-name="utility:close"
              alternative-text="close"
              size="small"
            ></lightning-icon>
          </button>
          <h2 id="import-modal-heading" class="slds-modal__title slds-hyphenate">
            Import Resource Roles
          </h2>
          <p class="import-modal-subtitle">Upload a CSV file with the columns shown below. Required fields are marked with *.</p>
        </header>

        <div class="slds-modal__content slds-p-around_medium" id="import-modal-content">
          <!-- Expected Format -->
          <h3 class="import-section-title">Expected Format</h3>
          <div class="import-format-table-wrap">
            <table class="import-format-table">
              <thead>
                <tr>
                  <th>Name*</th>
                  <th>Billing_Unit*</th>
                  <th>Price*</th>
                  <th>Cost</th>
                  <th>Location</th>
                  <th>Is_Active</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Senior Developer</td>
                  <td>Hour</td>
                  <td>150</td>
                  <td>120</td>
                  <td>San Francisco</td>
                  <td>true</td>
                </tr>
              </tbody>
            </table>
          </div>
          <p class="import-format-hint">Valid billing units: Hour | Location is optional | Is_Active should be true or false</p>

          <!-- File Upload -->
          <h3 class="import-section-title slds-m-top_medium">File Upload</h3>
          <div
            class={dropzoneClass}
            ondragover={handleDragOver}
            ondragleave={handleDragLeave}
            ondrop={handleDrop}
            onclick={handleDropzoneClick}
          >
            <template if:false={importFileName}>
              <lightning-icon icon-name="utility:upload" size="small" class="dropzone-icon"></lightning-icon>
              <p class="dropzone-title">Upload CSV file</p>
              <p class="dropzone-hint">Drag & drop or click to browse (max. 5MB)</p>
            </template>
            <template if:true={importFileName}>
              <lightning-icon icon-name="doctype:csv" size="small" class="dropzone-icon-file"></lightning-icon>
              <p class="dropzone-title">{importFileName}</p>
              <p class="dropzone-hint">{importRowCount} rows detected</p>
            </template>
            <input
              type="file"
              accept=".csv"
              class="file-input-hidden"
              onchange={handleFileChange}
            />
          </div>

          <!-- Import Error -->
          <template if:true={importError}>
            <div class="import-error-box">
              <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
              <span>{importError}</span>
            </div>
          </template>
        </div>

        <footer class="slds-modal__footer import-modal-footer">
          <div class="import-footer-left">
            <button class="btn-download-template" onclick={handleDownloadTemplate}>
              <lightning-icon icon-name="utility:download" size="xx-small"></lightning-icon>
              <span>Download Template</span>
            </button>
          </div>
          <div class="import-footer-right">
            <lightning-button
              label="Cancel"
              onclick={closeImportModal}
            ></lightning-button>
            <lightning-button
              variant="brand"
              label={importButtonLabel}
              onclick={handleImportCsv}
              disabled={isImportDisabled}
              class="slds-m-left_x-small"
            ></lightning-button>
          </div>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
  </template>
</template>
