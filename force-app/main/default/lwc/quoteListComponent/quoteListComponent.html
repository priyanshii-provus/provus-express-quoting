<template>
  <div class="quotes-container">
    <div class="premium-header">
      <div class="premium-header-content">
        <div class="greeting-box">
          <lightning-icon
            icon-name="standard:quotes"
            size="medium"
            class="premium-header-icon"
          ></lightning-icon>
          <div class="greeting-text">
            <h1>Quotes</h1>
            <p>Monitor, manage, and track all your sales quotes in one place</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content Card -->
    <div class="premium-card">
      <div class="card-title-row">
        <div class="card-heading">
          <h2>Quote Pipeline</h2>
          <span class="badge">{filteredQuotes.length} Quotes</span>
        </div>
        <button class="create-quote-btn" onclick={handleCreateQuote}>
          <lightning-icon
            icon-name="utility:add"
            size="xx-small"
            variant="inverse"
          ></lightning-icon>
          <span>Create Quote</span>
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-wrap">
          <lightning-input
            type="search"
            placeholder="Search quotes by name or account..."
            variant="label-hidden"
            onchange={handleSearch}
          ></lightning-input>
        </div>
        <div class="combo-wrap">
          <lightning-combobox
            name="statusFilter"
            placeholder="Filter by Status"
            value={statusFilter}
            options={statusOptions}
            variant="label-hidden"
            onchange={handleFilterChange}
          ></lightning-combobox>
        </div>
      </div>

      <!-- Datatable -->
      <div class="table-container">
        <lightning-datatable
          key-field="Id"
          data={filteredQuotes}
          columns={columns}
          onrowaction={handleRowAction}
          hide-checkbox-column
          class="slds-m-top_medium"
        ></lightning-datatable>
      </div>
    </div>
  </div>
</template>
