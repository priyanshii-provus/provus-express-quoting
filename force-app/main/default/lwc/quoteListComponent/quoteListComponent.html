<template>
  <div class="quotes-container">
    <!-- Page Header -->
    <div class="page-header">
      <div class="header-info">
        <h1>Quotes</h1>
        <p>Monitor, manage, and track all your sales quotes in one place</p>
      </div>
      <div class="header-actions">
        <button class="btn-ai-assistant" onclick={handleAIAssistant}>
          <lightning-icon
            icon-name="utility:magicwand"
            size="x-small"
            variant="inverse"
            class="slds-m-right_x-small"
          ></lightning-icon>
          AI Assistant
        </button>
      </div>
    </div>

    <!-- Main Content Card -->
    <div class="premium-card">
      <div class="card-title-row">
        <h2>Quote Pipeline</h2>
        <button class="create-quote-btn" onclick={handleCreateQuote}>
          <lightning-icon
            icon-name="utility:add"
            size="xx-small"
            variant="inverse"
          ></lightning-icon>
          <span>Create Quote</span>
        </button>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="search-wrap">
          <lightning-input
            type="search"
            placeholder="Search quotes by name or account..."
            variant="label-hidden"
            onchange={handleSearch}
          ></lightning-input>
        </div>
        <div class="combo-wrap">
          <lightning-combobox
            name="statusFilter"
            placeholder="Filter by Status"
            value={statusFilter}
            options={statusOptions}
            variant="label-hidden"
            onchange={handleFilterChange}
          ></lightning-combobox>
        </div>
      </div>

      <!-- Datatable -->
      <div class="table-container">
        <lightning-datatable
          key-field="Id"
          data={filteredQuotes}
          columns={columns}
          onrowaction={handleRowAction}
          hide-checkbox-column
          class="slds-m-top_medium"
        ></lightning-datatable>
      </div>
    </div>
  </div>
</template>
