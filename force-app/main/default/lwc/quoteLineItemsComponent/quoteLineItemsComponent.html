<template>
  <div class="premium-card">
    <div class="premium-header">
      <div class="premium-header-content">
        <lightning-icon
          icon-name="standard:product"
          size="medium"
          class="premium-header-icon"
          variant="inverse"
        ></lightning-icon>
        <h1>Quote Line Items</h1>
      </div>
      <div class="header-actions">
        <template if:false={isLocked}>
          <lightning-button
            label="Collapse All"
            icon-name="utility:chevrondown"
            onclick={handleCollapseAll}
            class="slds-m-right_small"
          ></lightning-button>
          <lightning-button
            label="Add Phase"
            icon-name="utility:add"
            onclick={handleAddPhase}
            class="slds-m-right_small"
          ></lightning-button>
          <lightning-button
            label="Profit Simulator"
            icon-name="utility:metrics"
            onclick={handleOpenSimulator}
            class="slds-m-right_small"
          ></lightning-button>
          <lightning-button
            label="Add Item"
            icon-name="utility:add"
            onclick={handleAddItemGlobal}
          ></lightning-button>
        </template>
      </div>
    </div>

    <div class="premium-content">
      <div class="phase-table-container">
        <!-- Table Header -->
        <div class="table-header">
          <div class="th-cell th-checkbox"></div>
          <div class="th-cell th-name">Name</div>
          <div class="th-cell th-phase">Phase</div>
          <div class="th-cell th-start">Start Date</div>
          <div class="th-cell th-end">End Date</div>
          <div class="th-cell th-qty">Quantity</div>
          <div class="th-cell th-baserate">Base Rate</div>
          <div class="th-cell th-unitprice">Unit Price</div>
          <div class="th-cell th-discount">Discount %</div>
          <div class="th-cell th-total">Total Price</div>
          <div class="th-cell th-actions"></div>
        </div>

        <!-- Phase Groups -->
        <template for:each={phaseGroups} for:item="group">
          <div key={group.key} class="phase-group">
            <!-- Phase Header Row -->
            <div
              class="phase-header-row"
              onclick={handleTogglePhase}
              data-phase={group.phase}
            >
              <div class="phase-toggle">
                <template if:true={group.isExpanded}>
                  <lightning-icon
                    icon-name="utility:chevrondown"
                    size="xx-small"
                  ></lightning-icon>
                </template>
                <template if:false={group.isExpanded}>
                  <lightning-icon
                    icon-name="utility:chevronright"
                    size="xx-small"
                  ></lightning-icon>
                </template>
              </div>
              <span class="phase-name">{group.phase}</span>
              <template if:false={isLocked}>
                <button
                  class="add-item-link"
                  onclick={handleAddItemToPhase}
                  data-phase={group.phase}
                >
                  + ADD ITEM
                </button>
              </template>
            </div>

            <!-- Phase Items -->
            <template if:true={group.isExpanded}>
              <template for:each={group.items} for:item="item">
                <div key={item.Id} class="item-row">
                  <div class="td-cell td-checkbox">
                    <span class="row-number">{item.rowNum}</span>
                  </div>
                  <div class="td-cell td-name">
                    <span class="item-name">{item.Name}</span>
                  </div>
                  <div class="td-cell td-phase">
                    <span class="phase-label">{item.Phase__c}</span>
                  </div>
                  <div class="td-cell td-start">{item.formattedStartDate}</div>
                  <div class="td-cell td-end">{item.formattedEndDate}</div>
                  <div class="td-cell td-qty">
                    <template if:false={isLocked}>
                      <div class="input-with-label">
                        <input
                          type="number"
                          class="inline-input"
                          value={item.displayQuantity}
                          data-id={item.Id}
                          data-field="Quantity"
                          onchange={handleInlineChange}
                          step="0.01"
                          min="0"
                        />
                        <span class="field-unit">{item.quantityLabel}</span>
                      </div>
                    </template>
                    <template if:true={isLocked}>
                      {item.displayQuantity} {item.quantityLabel}
                    </template>
                  </div>
                  <div class="td-cell td-baserate">
                    <template if:false={isLocked}>
                      <input
                        type="number"
                        class="inline-input"
                        value={item.BaseRateDisplay}
                        data-id={item.Id}
                        data-field="BaseRate"
                        onchange={handleInlineChange}
                        step="0.01"
                        min="0"
                      />
                    </template>
                    <template if:true={isLocked}>
                      <lightning-formatted-number
                        value={item.BaseRateDisplay}
                        format-style="currency"
                        currency-code="INR"
                      ></lightning-formatted-number>
                    </template>
                  </div>
                  <div class="td-cell td-unitprice">
                    <div
                      class="readonly-unit-price"
                      title={item.calculationLogic}
                    >
                      <lightning-formatted-number
                        value={item.UnitPrice}
                        format-style="currency"
                        currency-code="INR"
                      ></lightning-formatted-number>
                      <template if:true={item.isResource}>
                        <span class="field-unit">{item.unitPriceLabel}</span>
                      </template>
                    </div>
                  </div>
                  <div class="td-cell td-discount">
                    <template if:false={isLocked}>
                      <input
                        type="number"
                        class="inline-input"
                        value={item.rawDiscount}
                        data-id={item.Id}
                        data-field="Discount"
                        onchange={handleInlineChange}
                        step="1"
                        min="0"
                        max="100"
                      />
                    </template>
                    <template if:true={isLocked}>
                      {item.displayDiscount}
                    </template>
                  </div>
                  <div class="td-cell td-total">
                    <lightning-formatted-number
                      value={item.TotalPrice}
                      format-style="currency"
                      currency-code="INR"
                    ></lightning-formatted-number>
                  </div>
                  <div class="td-cell td-actions">
                    <template if:false={isLocked}>
                      <lightning-button-icon
                        icon-name="utility:delete"
                        alternative-text="Delete"
                        variant="bare"
                        size="small"
                        data-id={item.Id}
                        onclick={handleDeleteItem}
                        class="delete-btn"
                      ></lightning-button-icon>
                    </template>
                  </div>
                </div>
              </template>
            </template>
          </div>
        </template>

        <!-- Total Row -->
        <div class="total-row">
          <div class="total-label">Total</div>
          <div class="total-value">
            <lightning-formatted-number
              value={grandTotal}
              format-style="currency"
              currency-code="INR"
            ></lightning-formatted-number>
          </div>
        </div>
      </div>

      <!-- Add Phase Name Modal -->
      <template if:true={isPhaseModalOpen}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open dark-modal"
        >
          <div class="slds-modal__container">
            <header class="slds-modal__header">
              <button
                class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close"
                onclick={closePhaseModal}
              >
                <lightning-icon
                  icon-name="utility:close"
                  alternative-text="close"
                  variant="inverse"
                  size="small"
                ></lightning-icon>
              </button>
              <h2 class="slds-modal__title slds-hyphenate">Add New Phase</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium custom-form">
              <div class="custom-field">
                <label><span class="required">*</span> Phase Name</label>
                <lightning-input
                  variant="label-hidden"
                  type="text"
                  value={newPhaseName}
                  onchange={handlePhaseNameChange}
                  placeholder="e.g. Discovery, Development, Testing"
                  required
                ></lightning-input>
              </div>
            </div>
            <footer class="slds-modal__footer">
              <lightning-button
                label="Cancel"
                onclick={closePhaseModal}
              ></lightning-button>
              <lightning-button
                variant="brand"
                label="Create Phase"
                onclick={handleCreatePhase}
                class="slds-m-left_x-small"
              ></lightning-button>
            </footer>
          </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>

      <!-- Item Type Picker Modal -->
      <template if:true={isItemPickerOpen}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open dark-modal"
        >
          <div class="slds-modal__container">
            <header class="slds-modal__header">
              <button
                class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close"
                onclick={closeItemPicker}
              >
                <lightning-icon
                  icon-name="utility:close"
                  alternative-text="close"
                  variant="inverse"
                  size="small"
                ></lightning-icon>
              </button>
              <h2 class="slds-modal__title slds-hyphenate">
                Add Item to {activePhase}
              </h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
              <div class="item-type-grid">
                <button class="item-type-card" onclick={handlePickProduct}>
                  <lightning-icon
                    icon-name="standard:product"
                    size="medium"
                  ></lightning-icon>
                  <span>Product</span>
                </button>
                <button class="item-type-card" onclick={handlePickResource}>
                  <lightning-icon
                    icon-name="standard:user"
                    size="medium"
                  ></lightning-icon>
                  <span>Resource</span>
                </button>
                <button class="item-type-card" onclick={handlePickAddon}>
                  <lightning-icon
                    icon-name="standard:orders"
                    size="medium"
                  ></lightning-icon>
                  <span>Add-on</span>
                </button>
              </div>
            </div>
          </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>

      <!-- Add Product Modal -->
      <template if:true={isProductModalOpen}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open dark-modal"
        >
          <div class="slds-modal__container">
            <header class="slds-modal__header">
              <button
                class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close"
                onclick={closeProductModal}
              >
                <lightning-icon
                  icon-name="utility:close"
                  alternative-text="close"
                  variant="inverse"
                  size="small"
                ></lightning-icon>
              </button>
              <h2 class="slds-modal__title slds-hyphenate">Add Product</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium custom-form">
              <div class="custom-field">
                <label><span class="required">*</span> Select Product</label>
                <lightning-combobox
                  variant="label-hidden"
                  options={productOptions}
                  value={selectedPBEId}
                  onchange={handleProductChange}
                  required
                ></lightning-combobox>
              </div>
              <div class="custom-field">
                <label><span class="required">*</span> Quantity</label>
                <lightning-input
                  variant="label-hidden"
                  type="number"
                  value={productQuantity}
                  onchange={handleProductQuantityChange}
                  required
                ></lightning-input>
              </div>
              <div class="custom-field">
                <label>Unit Price (Calculated)</label>
                <lightning-input
                  variant="label-hidden"
                  type="number"
                  formatter="currency"
                  currency-code="INR"
                  step="0.01"
                  value={productUnitPrice}
                  read-only
                ></lightning-input>
              </div>
            </div>
            <footer class="slds-modal__footer">
              <lightning-button
                label="Cancel"
                onclick={closeProductModal}
              ></lightning-button>
              <lightning-button
                variant="brand"
                label="Save"
                onclick={handleSaveProduct}
                class="slds-m-left_x-small"
              ></lightning-button>
            </footer>
          </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>

      <!-- Add Resource Modal -->
      <template if:true={isResourceModalOpen}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open dark-modal"
        >
          <div class="slds-modal__container">
            <header class="slds-modal__header">
              <button
                class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close"
                onclick={closeResourceModal}
              >
                <lightning-icon
                  icon-name="utility:close"
                  alternative-text="close"
                  variant="inverse"
                  size="small"
                ></lightning-icon>
              </button>
              <h2 class="slds-modal__title slds-hyphenate">Add Resource</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium custom-form">
              <div class="custom-field">
                <label><span class="required">*</span> Select Role</label>
                <lightning-combobox
                  variant="label-hidden"
                  options={resourceOptions}
                  value={selectedRoleId}
                  onchange={handleResourceChange}
                  required
                ></lightning-combobox>
              </div>
              <div class="custom-field">
                <label><span class="required">*</span> Duration (Months)</label>
                <lightning-input
                  variant="label-hidden"
                  type="number"
                  step="0.01"
                  value={resourceQuantity}
                  onchange={handleResourceQuantityChange}
                  required
                ></lightning-input>
              </div>
              <div class="custom-field">
                <label>Unit Price (Calculated)</label>
                <lightning-input
                  variant="label-hidden"
                  type="number"
                  formatter="currency"
                  currency-code="INR"
                  step="0.01"
                  value={resourceUnitPrice}
                  read-only
                ></lightning-input>
              </div>
            </div>
            <footer class="slds-modal__footer">
              <lightning-button
                label="Cancel"
                onclick={closeResourceModal}
              ></lightning-button>
              <lightning-button
                variant="brand"
                label="Save"
                onclick={handleSaveResource}
                class="slds-m-left_x-small"
              ></lightning-button>
            </footer>
          </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>

      <!-- Add Add-on Modal -->
      <template if:true={isAddonModalOpen}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open dark-modal"
        >
          <div class="slds-modal__container">
            <header class="slds-modal__header">
              <button
                class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close"
                onclick={closeAddonModal}
              >
                <lightning-icon
                  icon-name="utility:close"
                  alternative-text="close"
                  variant="inverse"
                  size="small"
                ></lightning-icon>
              </button>
              <h2 class="slds-modal__title slds-hyphenate">Add Add-on</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium custom-form">
              <div class="custom-field">
                <label><span class="required">*</span> Select Add-on</label>
                <lightning-combobox
                  variant="label-hidden"
                  options={addonOptions}
                  value={selectedAddonId}
                  onchange={handleAddonChange}
                  required
                ></lightning-combobox>
              </div>
              <div class="custom-field">
                <label><span class="required">*</span> Quantity (Items)</label>
                <lightning-input
                  variant="label-hidden"
                  type="number"
                  value={addonQuantity}
                  onchange={handleAddonQuantityChange}
                  required
                ></lightning-input>
              </div>
              <div class="custom-field">
                <label>Unit Price (Calculated)</label>
                <lightning-input
                  variant="label-hidden"
                  type="number"
                  formatter="currency"
                  currency-code="INR"
                  step="0.01"
                  value={addonUnitPrice}
                  read-only
                ></lightning-input>
              </div>
            </div>
            <footer class="slds-modal__footer">
              <lightning-button
                label="Cancel"
                onclick={closeAddonModal}
              ></lightning-button>
              <lightning-button
                variant="brand"
                label="Save"
                onclick={handleSaveAddon}
                class="slds-m-left_x-small"
              ></lightning-button>
            </footer>
          </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>

      <!-- SIMULATOR MODAL -->
      <template if:true={isSimulatorModalOpen}>
        <section
          role="dialog"
          tabindex="-1"
          class="slds-modal slds-fade-in-open slds-modal_large"
        >
          <div class="slds-modal__container">
            <header class="slds-modal__header">
              <button
                class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                title="Close"
                onclick={handleCloseSimulator}
              >
                <lightning-icon
                  icon-name="utility:close"
                  alternative-text="close"
                  variant="inverse"
                  size="small"
                ></lightning-icon>
                <span class="slds-assistive-text">Close</span>
              </button>
              <h2 class="slds-text-heading_medium slds-hyphenate">
                Margin Simulator
              </h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <div style="max-width: 800px; margin: 0 auto;">
                    <c-profit-simulator
                        record-id={recordId}
                    ></c-profit-simulator>
                </div>
            </div>
            <footer class="slds-modal__footer">
              <lightning-button
                label="Close"
                onclick={handleCloseSimulator}
              ></lightning-button>
            </footer>
          </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
      </template>
    </div>
  </div>
</template>
