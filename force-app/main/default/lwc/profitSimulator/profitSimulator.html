<template>
    <lightning-card>
        <div class="slds-p-around_medium" style="background: white;">
            
            <div class="slds-grid slds-wrap slds-gutters">
                <!-- Left side: Gauge -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-text-align_center slds-p-bottom_medium">
                    <div style="position: relative; width: 180px; height: 180px; margin: 0 auto;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="transform: rotate(-90deg); width: 100%; height: 100%;">
                            <!-- bg -->
                            <path class="circle-bg" stroke="#f3f4f6" stroke-width="4" fill="none"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <!-- progress -->
                            <path class="circle" stroke={gaugeColor} stroke-width="4" fill="none"
                                stroke-dasharray={gaugeValue}
                                style="transition: stroke-dasharray 0.3s ease, stroke 0.3s ease; stroke-linecap: round;"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 0.75rem; color: #6b7280; font-weight: 600; letter-spacing: 0.05em; margin-bottom: -4px;">MARGIN</span>
                            <span style="font-size: 2.2rem; font-weight: 800; color: #1f2937; line-height: 1.2;">{displayMargin}%</span>
                            <span class={badgeClass} style="margin-top: 2px;">{badgeText}</span>
                        </div>
                    </div>
                </div>

                <!-- Right side: Metrics & Slider -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <div class="slds-grid slds-wrap" style="gap: 12px; margin-bottom: 24px;">
                        <div class="slds-col slds-size_1-of-1" style="background: #f8fafc; padding: 12px 16px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.85rem; color: #64748b; font-weight: 600;">FINAL REVENUE</span>
                            <span style="font-size: 1.25rem; font-weight: 700; color: #0f172a;">{formattedFinalRevenue}</span>
                        </div>
                        <div class="slds-col slds-size_1-of-1" style="background: #f8fafc; padding: 12px 16px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.85rem; color: #64748b; font-weight: 600;">TOTAL COST</span>
                            <span style="font-size: 1.25rem; font-weight: 700; color: #0f172a;">{formattedTotalCost}</span>
                        </div>
                        <div class="slds-col slds-size_1-of-1" style="background: #f8fafc; padding: 12px 16px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.85rem; color: #64748b; font-weight: 600;">NET PROFIT</span>
                            <span style="font-size: 1.25rem; font-weight: 700; color: #0f172a;">{formattedNetProfit}</span>
                        </div>
                    </div>

                    <div style="background: #ffffff; padding: 16px 20px; border-radius: 8px; border: 1px solid #cbd5e1;">
                        <lightning-slider 
                            label="Simulate Target Discount (%)" 
                            title="Adjust to see discount impact"
                            value={discount} 
                            min="0" 
                            max="50" 
                            onchange={handleDiscountChange}>
                        </lightning-slider>
                    </div>
                </div>
            </div>

        </div>
    </lightning-card>
</template>
