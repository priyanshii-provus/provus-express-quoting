<template>
    <lightning-card title="Accounts" icon-name="standard:account">
        <div class="slds-m-around_medium">
            <!-- Filters -->
            <div class="slds-grid slds-gutters slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-3">
                    <lightning-input type="search" placeholder="Search Accounts..." onchange={handleSearch}></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <lightning-combobox name="industryFilter" label="Filter by Industry" value={industryFilter} options={industryOptions} onchange={handleFilterChange}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                    <lightning-button label="New Account" variant="brand" onclick={handleNewAccount}></lightning-button>
                </div>
            </div>

            <!-- Datatable -->
            <div style="height: 300px;">
                <lightning-datatable
                    key-field="Id"
                    data={filteredAccounts}
                    columns={columns}
                    onrowaction={handleRowAction}
                    hide-checkbox-column
                ></lightning-datatable>
            </div>
        </div>
    </lightning-card>
</template>
